version: '3.9'

services:

  frontend:
    build:
      context: ./frontend
    container_name: nextjs-frontend
    ports:
      - "3003:3000"

  backend:
    build:
      context: ./backend
    container_name: nestjs-backend
    ports:
      - "3002:3000"

  nginx:
    image: nginx:latest
    container_name: nginx-reverse-proxy
    ports:
      - "80:80"
    volumes:
      - /etc/nginx/conf.d/nextjs.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
